<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PactPool — Goal Wall</title>
<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060a0f;--surf:#0d1520;--surf2:#111d2e;
    --border:#1a2d45;--accent:#00ff88;--accent2:#00c8ff;
    --warn:#ffd60a;--red:#ff4757;--purple:#a78bfa;
    --text:#e2eaf4;--muted:#5a7a9a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}

  nav{
    padding:16px 32px;display:flex;align-items:center;
    justify-content:space-between;border-bottom:1px solid var(--border);
    background:rgba(6,10,15,0.95);backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:100;
  }
  .logo{font-size:22px;font-weight:800;color:var(--accent);}
  nav a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:700;margin-left:24px;}
  nav a:hover{color:var(--accent);}

  .page-header{padding:48px 32px 32px;text-align:center;}
  .page-header h1{font-size:clamp(32px,6vw,52px);font-weight:800;letter-spacing:-.03em;}
  .page-header h1 span{color:var(--accent);}
  .page-header p{color:var(--muted);margin-top:12px;font-size:15px;line-height:1.6;}

  .stats-row{
    display:flex;justify-content:center;gap:48px;padding:20px;flex-wrap:wrap;
    background:var(--surf);border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  }
  .stat{text-align:center;}
  .stat .v{font-size:24px;font-weight:800;font-family:'Space Mono',monospace;color:var(--accent);}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}

  .filter-bar{display:flex;gap:10px;padding:24px 32px;flex-wrap:wrap;}
  .filter-btn{
    padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);color:var(--muted);
    background:var(--surf);transition:all .2s;font-family:'Syne',sans-serif;
  }
  .filter-btn:hover{color:var(--text);}
  .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:16px;padding:0 32px 48px;
  }

  .saver-card{
    background:var(--surf);border:1px solid var(--border);
    border-radius:14px;padding:20px;
    transition:transform .2s,border-color .2s;
    animation:fadeIn .4s ease both;
  }
  .saver-card:hover{transform:translateY(-3px);}
  .saver-card.completed{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.03);}
  .saver-card.penalized{border-color:rgba(255,71,87,0.35);background:rgba(255,71,87,0.03);}
  .saver-card.active{border-color:rgba(0,200,255,0.3);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;}
  .addr{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .status-badge{
    font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;
    text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0;
  }
  .badge-active{background:rgba(0,200,255,0.12);color:var(--accent2);border:1px solid rgba(0,200,255,0.2);}
  .badge-done{background:rgba(0,255,136,0.12);color:var(--accent);border:1px solid rgba(0,255,136,0.2);}
  .badge-broken{background:rgba(255,71,87,0.12);color:var(--red);border:1px solid rgba(255,71,87,0.2);}

  .goal-text{
    font-size:17px;font-weight:700;margin-bottom:12px;line-height:1.3;
    color:var(--text);
  }
  .goal-text::before{content:'"';color:var(--accent);margin-right:2px;}
  .goal-text::after{content:'"';color:var(--accent);margin-left:2px;}

  .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0 6px;}
  .progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
  .fill-active{background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .fill-done{background:var(--accent);}
  .fill-broken{background:var(--red);}

  .card-meta{
    display:flex;justify-content:space-between;
    font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;
    margin-top:8px;
  }
  .penalty-note{
    background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.2);
    border-radius:8px;padding:8px 12px;margin-top:10px;
    font-size:11px;color:var(--warn);font-family:'Space Mono',monospace;
  }

  .loading{text-align:center;padding:80px;color:var(--muted);font-size:16px;}
  .empty{
    text-align:center;padding:80px;color:var(--muted);
    grid-column:1/-1;
  }
  .empty h3{font-size:18px;margin-bottom:8px;}
  .empty p{font-size:14px;}

  /* Search bar */
  .search-wrap{padding:0 32px 16px;}
  .search-wrap input{
    width:100%;max-width:400px;background:#081018;
    border:1px solid var(--border);color:var(--text);
    padding:11px 16px;border-radius:10px;font-size:14px;
    font-family:'Space Mono',monospace;outline:none;transition:border .2s;
  }
  .search-wrap input:focus{border-color:var(--accent);}
  .search-wrap input::placeholder{color:var(--muted);}

  .refresh-btn{
    padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);color:var(--muted);
    background:var(--surf);transition:all .2s;font-family:'Space Mono',monospace;
    margin-left:12px;
  }
  .refresh-btn:hover{color:var(--accent);border-color:var(--accent);}
</style>
</head>
<body>

<!-- ══ FILL THIS AFTER P1 DEPLOYS CONTRACT ══ -->
<script>
const CONFIG = {
  address: "PASTE_CONTRACT_ADDRESS_HERE",
  abi: [
    // PASTE ABI ARRAY HERE
  ]
};
</script>

<nav>
  <div class="logo">⬡ PactPool</div>
  <div>
    <a href="index.html">← Make a Pact</a>
    <a href="#" onclick="init()">↻ Refresh</a>
  </div>
</nav>

<div class="page-header">
  <h1><span>Goal</span> Wall</h1>
  <p>Every pact made on-chain. Public accountability meets financial incentive.<br>
  Break your pact and the whole world sees it — and funds the winners.</p>
</div>

<div class="stats-row">
  <div class="stat"><div class="v" id="s-locked">…</div><div class="l">ETH Locked</div></div>
  <div class="stat"><div class="v" id="s-pool">…</div><div class="l">Penalty Pool</div></div>
  <div class="stat"><div class="v" id="s-total">…</div><div class="l">Total Savers</div></div>
  <div class="stat"><div class="v" id="s-complete">…</div><div class="l">Completed ✅</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">🌐 All Savers</button>
  <button class="filter-btn" onclick="setFilter('active',this)">🔒 Active</button>
  <button class="filter-btn" onclick="setFilter('completed',this)">✅ Completed</button>
  <button class="filter-btn" onclick="setFilter('penalized',this)">🚨 Pact Broken</button>
</div>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Search goals or addresses..." oninput="renderCards()">
</div>

<div class="grid" id="cards-grid">
  <div class="loading">⟳ Loading savers from blockchain…</div>
</div>

<script>
let allSavers = [];
let currentFilter = 'all';

async function init() {
  document.getElementById('cards-grid').innerHTML = '<div class="loading">⟳ Loading savers from blockchain…</div>';

  // Use a public Sepolia RPC (no wallet needed for read-only)
  const provider = new ethers.providers.JsonRpcProvider("https://rpc.sepolia.org");
  const contract = new ethers.Contract(CONFIG.address, CONFIG.abi, provider);

  try {
    const [stats, addrs] = await Promise.all([
      contract.getPoolStats(),
      contract.getAllSavers()
    ]);

    document.getElementById('s-locked').textContent = parseFloat(ethers.utils.formatEther(stats._totalLocked)).toFixed(4);
    document.getElementById('s-pool').textContent   = parseFloat(ethers.utils.formatEther(stats._penaltyPool)).toFixed(4);
    document.getElementById('s-total').textContent  = stats._totalSavers.toString();

    if (addrs.length === 0) {
      document.getElementById('cards-grid').innerHTML =
        '<div class="empty"><h3>No savers yet!</h3><p>Be the first to make a pact.</p></div>';
      document.getElementById('s-complete').textContent = '0';
      return;
    }

    // Fetch all saver details in parallel
    const infos = await Promise.all(addrs.map(a => contract.getSaverInfo(a)));
    allSavers = addrs.map((addr, i) => ({ addr, ...infos[i] }));

    const completed = allSavers.filter(s => s.withdrawn && !s.penalized).length;
    document.getElementById('s-complete').textContent = completed;

    renderCards();
  } catch(e) {
    document.getElementById('cards-grid').innerHTML =
      '<div class="empty"><h3>⚠️ Could not load data</h3><p>Is the contract address set in CONFIG? Check console.</p></div>';
    console.error("init error:", e);
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const grid   = document.getElementById('cards-grid');

  let filtered = allSavers;

  // Apply filter
  if (currentFilter === 'active')    filtered = filtered.filter(s => !s.withdrawn && !s.penalized);
  if (currentFilter === 'completed') filtered = filtered.filter(s => s.withdrawn && !s.penalized);
  if (currentFilter === 'penalized') filtered = filtered.filter(s => s.penalized);

  // Apply search
  if (search) {
    filtered = filtered.filter(s =>
      s.goal.toLowerCase().includes(search) ||
      s.addr.toLowerCase().includes(search)
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><h3>No savers found.</h3><p>Try a different filter or search.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((s, idx) => buildCard(s, idx)).join('');
}

function buildCard(s, idx) {
  const now = Math.floor(Date.now() / 1000);
  const unlockTime = s.unlockTime.toNumber ? s.unlockTime.toNumber() : parseInt(s.unlockTime);
  const depTime    = s.depositTime.toNumber ? s.depositTime.toNumber() : parseInt(s.depositTime);

  let statusClass, badgeClass, badgeText, fillClass;

  if (s.penalized) {
    statusClass = 'penalized';
    badgeClass  = 'badge-broken';
    badgeText   = '🚨 Pact Broken';
    fillClass   = 'fill-broken';
  } else if (s.withdrawn) {
    statusClass = 'completed';
    badgeClass  = 'badge-done';
    badgeText   = '✅ Completed';
    fillClass   = 'fill-done';
  } else {
    statusClass = 'active';
    badgeClass  = 'badge-active';
    badgeText   = '🔒 Active';
    fillClass   = 'fill-active';
  }

  const amountEth = parseFloat(ethers.utils.formatEther(s.amount)).toFixed(4);
  const pct       = Math.min(100, s.progressPct.toNumber ? s.progressPct.toNumber() : parseInt(s.progressPct));
  const unlockDate = new Date(unlockTime * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  const shortAddr  = s.addr.slice(0, 6) + '...' + s.addr.slice(-4);

  // Penalty note for early broken pacts
  const penaltyNote = s.penalized
    ? `<div class="penalty-note">⚠️ This saver broke their pact. Their penalty funded the reward pool.</div>`
    : '';

  return `
  <div class="saver-card ${statusClass}" style="animation-delay:${idx * 0.04}s">
    <div class="card-header">
      <div class="addr">${shortAddr}</div>
      <div class="status-badge ${badgeClass}">${badgeText}</div>
    </div>
    <div class="goal-text">${escapeHtml(s.goal)}</div>
    <div class="progress-bar">
      <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
    </div>
    <div class="card-meta">
      <span>${amountEth} ETH</span>
      <span>${pct}% complete</span>
      <span>Unlocks ${unlockDate}</span>
    </div>
    ${penaltyNote}
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-load on page open
window.addEventListener('load', init);
</script>
</body>
</html>
